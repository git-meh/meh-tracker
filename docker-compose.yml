version: "3.8"

services:
  # Local Supabase alternative for development
  # For full Supabase local dev, use: https://supabase.com/docs/guides/cli/local-development
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meh-tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
